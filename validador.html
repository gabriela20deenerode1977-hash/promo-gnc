<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador GNC - Estación</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root { --accent: #f1c40f; --bg: #1a1a1a; --card: #2d2d2d; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; max-width: 450px; margin: auto; }
        
        /* Área de Escaneo */
        #reader { width: 100%; border-radius: 10px; background: #000; margin: 15px 0; }
        
        /* Formulario de Cobro */
        .calc-box { background: #3d3d3d; padding: 15px; border-radius: 10px; text-align: left; margin-top: 15px; }
        input { 
            width: 100%; padding: 15px; border-radius: 8px; border: none; font-size: 22px; 
            background: #111; color: #fff; box-sizing: border-box; margin: 10px 0;
        }

        .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 18px; }
        .total { font-size: 26px; font-weight: bold; color: #2ecc71; border-top: 1px solid #555; padding-top: 10px; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-scan { background: var(--accent); color: #000; }
        .btn-save { background: #2ecc71; color: white; }
        .btn-stats { background: #3498db; color: white; margin-top: 30px; }
        
        #seccion-cobro, #seccion-stats { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="seccion-scanner">
        <h2>Validar Cupón GNC</h2>
        <p style="color: #bbb;">Presioná el botón para activar la cámara</p>
        
        <div id="reader"></div>
        
        <button id="btn-iniciar" class="btn btn-scan" onclick="startScanner()">📷 ACTIVAR CÁMARA</button>
        <button class="btn btn-stats" onclick="verStats()">📊 CIERRE DE TURNO</button>
    </div>

    <div id="seccion-cobro">
        <h2 style="color: var(--accent);">Cupón Validado</h2>
        <div class="calc-box">
            <div class="row"><span>🚗 Patente:</span> <b id="out-patente">---</b></div>
            <div class="row"><span>🎁 Descuento:</span> <b id="out-premio">0%</b></div>
            <hr>
            <label>Monto Total Surtidor ($):</label>
            <input type="number" id="in-monto" placeholder="Ej: 5000" oninput="recalcular()">

            <div class="row"><span>Ahorro cliente:</span> <span id="out-ahorro" style="color:#e74c3c">-$0</span></div>
            <div class="row total"><span>A COBRAR:</span> <span id="out-final">$0</span></div>
        </div>
        
        <button class="btn btn-save" onclick="guardarVenta()">💾 REGISTRAR COBRO</button>
        <button class="btn" style="background:#666; color:white" onclick="cancelar()">VOLVER</button>
    </div>

    <div id="seccion-stats">
        <h2>Resumen del Turno</h2>
        <div class="calc-box" style="text-align:center;">
            <p>Total Descontado:</p>
            <h1 id="stat-desc" style="color:#e74c3c; margin:5px 0;">$0</h1>
            <p>Total Neto en Caja:</p>
            <h1 id="stat-neto" style="color:#2ecc71; margin:5px 0;">$0</h1>
            <p>Cupones usados: <b id="stat-cant">0</b></p>
        </div>
        <button class="btn btn-scan" onclick="cancelar()">VOLVER A ESCANEAR</button>
        <button class="btn" style="background:#c0392b; color:white; margin-top:40px;" onclick="resetTurno()">BORRAR TURNO</button>
    </div>
</div>

<script>
    const scanner = new Html5Qrcode("reader");
    let cupoActual = {};
    let ahorroGlobal = 0;
    let netoGlobal = 0;

    function startScanner() {
        document.getElementById('btn-iniciar').classList.add('hidden');
        
        scanner.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (text) => {
                scanner.stop();
                procesarQR(text);
            },
            (err) => { /* Ignorar errores de búsqueda */ }
        ).catch(err => {
            alert("Error al abrir cámara. Asegurate de dar permisos.");
            document.getElementById('btn-iniciar').classList.remove('hidden');
        });
    }

    function procesarQR(text) {
        try {
            // Formato esperado: ID:XXX|PAT:YYY|PREMIO:ZZZ
            const data = {};
            text.split('|').forEach(item => {
                const [k, v] = item.split(':');
                data[k] = v;
            });

            cupoActual = data;
            document.getElementById('out-patente').innerText = data.PAT;
            document.getElementById('out-premio').innerText = data.PREMIO;
            
            document.getElementById('seccion-scanner').style.display = 'none';
            document.getElementById('seccion-cobro').style.display = 'block';
        } catch(e) {
            alert("QR inválido o mal formado.");
            cancelar();
        }
    }

    function recalcular() {
        const total = parseFloat(document.getElementById('in-monto').value) || 0;
        const descPct = parseInt(cupoActual.PREMIO) || 0;
        
        ahorroGlobal = (total * descPct) / 100;
        netoGlobal = total - ahorroGlobal;

        document.getElementById('out-ahorro').innerText = "-$" + ahorroGlobal.toFixed(2);
        document.getElementById('out-final').innerText = "$" + netoGlobal.toFixed(2);
    }

    function guardarVenta() {
        if (netoGlobal <= 0) return alert("Ingresá el monto de la carga");

        let stats = JSON.parse(localStorage.getItem('stats_gnc') || '{"d":0, "n":0, "c":0}');
        stats.d += ahorroGlobal;
        stats.n += netoGlobal;
        stats.c += 1;
        
        localStorage.setItem('stats_gnc', JSON.stringify(stats));
        alert("¡Venta registrada con éxito!");
        cancelar();
    }

    function verStats() {
        let stats = JSON.parse(localStorage.getItem('stats_gnc') || '{"d":0, "n":0, "c":0}');
        document.getElementById('stat-desc').innerText = "$" + stats.d.toFixed(2);
        document.getElementById('stat-neto').innerText = "$" + stats.n.toFixed(2);
        document.getElementById('stat-cant').innerText = stats.c;

        document.getElementById('seccion-scanner').style.display = 'none';
        document.getElementById('seccion-stats').style.display = 'block';
    }

    function resetTurno() {
        if(confirm("¿Reiniciar contadores a cero?")) {
            localStorage.setItem('stats_gnc', '{"d":0, "n":0, "c":0}');
            verStats();
        }
    }

    function cancelar() {
        location.reload();
    }
</script>

</body>
</html>
