<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promo GNC - Raspá y Ganá</title>
    
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-color: #f1c40f;
            --secondary-color: #2c3e50;
            --bg-color: #f8f9fa;
            --success-color: #27ae60;
            --whatsapp-color: #25D366;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background-color: var(--bg-color); margin: 0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 380px; text-align: center; border: 1px solid #eee; }
        .titulo { color: var(--secondary-color); margin: 0 0 5px 0; font-size: 24px; font-weight: 800; }
        .subtitulo { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 18px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 18px; text-transform: uppercase; text-align: center; outline: none; }
        .btn { width: 100%; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .btn-principal { background: var(--primary-color); color: var(--secondary-color); }
        .btn-descargar { background: #3498db; color: white; }
        .btn-whatsapp { background: var(--whatsapp-color); color: white; }
        
        /* Contenedor del raspable con bloqueo de scroll para que no falle el dedo */
        .scratch-container { 
            position: relative; 
            width: 280px; 
            height: 150px; 
            margin: 0 auto; 
            border: 5px solid var(--primary-color); 
            border-radius: 20px; 
            overflow: hidden; 
            background: #fff;
            touch-action: none; /* Crucial: evita que el navegador mueva la página al raspar */
        }
        
        .prize-under { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; }
        .monto-premio { font-size: 42px; font-weight: 900; color: var(--success-color); margin: 0; }
        #scratchCanvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: crosshair; }
        
        #captura-cupon { background: white; padding: 20px; border: 2px dashed var(--primary-color); border-radius: 15px; margin-bottom: 20px; }
        #area-qr { display: flex; justify-content: center; margin: 15px 0; min-height: 150px; align-items: center; }
        .hidden { display: none !important; }
        .error-msg { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="paso-registro">
        <h2 class="titulo">¡Promo GNC!</h2>
        <p class="subtitulo">Ingresá tu patente para jugar.</p>
        <div id="mensaje-error" class="error-msg"></div>
        <div class="input-group">
            <label>Patente del Vehículo</label>
            <input type="text" id="reg-patente" placeholder="AF123BK" maxlength="9">
        </div>
        <button onclick="validarYEmpezar()" class="btn btn-principal">Validar y Jugar</button>
    </div>

    <div id="paso-juego" class="hidden">
        <div class="scratch-container" id="container">
            <div class="prize-under">
                <p id="texto-premio" class="monto-premio"></p> 
                <p style="font-weight: bold; margin: 0;">DESC. GNC</p>
            </div>
            <canvas id="scratchCanvas" width="280" height="150"></canvas>
        </div>
        <p style="color: #e67e22; font-weight: bold; margin-top: 20px;">👆 Raspá con el dedo para ganar</p>
    </div>

    <div id="paso-cupon" class="hidden">
        <div id="captura-cupon">
            <div style="font-weight: 800; color: var(--secondary-color); border-bottom: 1px solid #eee; padding-bottom: 10px;">CUPÓN DE DESCUENTO</div>
            <div id="area-qr"></div>
            <div id="txt-premio-foto" style="font-size: 28px; font-weight: 900; color: var(--success-color);"></div>
            <div id="txt-patente-foto" style="font-weight: bold; margin-top: 5px; font-family: monospace;"></div>
            <div id="txt-id-foto" style="font-size: 10px; color: #bdc3c7; margin-top: 10px;"></div>
        </div>
        <button onclick="enviarWhatsApp()" class="btn btn-whatsapp">📲 ENVIAR AL PLAYERO</button>
        <button onclick="descargarCupon()" class="btn btn-descargar">💾 GUARDAR EN GALERÍA</button>
        <button onclick="reiniciarTodo()" class="btn" style="background:#eee; color:#666; font-size:12px;">🔄 NUEVA CARGA</button>
    </div>
</div>

<script>
    let premioAsignado = "";
    let codigoUnico = "";
    let patenteCliente = "";
    const TELEFONO_ESTACION = "5491127098175";
    const TIEMPO_ESPERA_MINUTOS = 120;

    function validarYEmpezar() {
        const inputPatente = document.getElementById('reg-patente');
        const msgError = document.getElementById('mensaje-error');
        patenteCliente = inputPatente.value.trim().toUpperCase();
        msgError.style.display = 'none';

        if (patenteCliente.length < 6) {
            alert("Por favor, ingresá una patente válida.");
            return;
        }

        const registroCargas = JSON.parse(localStorage.getItem('gnc_registro_patentes') || '{}');
        const ahora = Date.now();

        if (registroCargas[patenteCliente]) {
            const tiempoTranscurrido = (ahora - registroCargas[patenteCliente]) / 1000 / 60;
            if (tiempoTranscurrido < TIEMPO_ESPERA_MINUTOS) {
                const faltan = Math.ceil(TIEMPO_ESPERA_MINUTOS - tiempoTranscurrido);
                msgError.innerText = `Esta patente ya jugó. Falta: ${faltan} min.`;
                msgError.style.display = 'block';
                return;
            }
        }

        registroCargas[patenteCliente] = ahora;
        localStorage.setItem('gnc_registro_patentes', JSON.stringify(registroCargas));

        const rand = Math.random() * 100;
        if (rand < 5) premioAsignado = "20%";
        else if (rand < 25) premioAsignado = "15%";
        else if (rand < 60) premioAsignado = "10%";
        else premioAsignado = "5%";

        codigoUnico = "GNC-" + Math.random().toString(36).substr(2, 5).toUpperCase();
        document.getElementById('texto-premio').innerText = premioAsignado;
        
        document.getElementById('paso-registro').classList.add('hidden');
        document.getElementById('paso-juego').classList.remove('hidden');
        
        // Esperamos un milisegundo para que el canvas se dibuje bien
        setTimeout(iniciarJuego, 50);
    }

    function iniciarJuego() {
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let isDrawing = false;
        
        // Rellenar capa gris
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Texto guía
        ctx.fillStyle = '#7f8c8d';
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('¡RASPÁ AQUÍ!', canvas.width / 2, canvas.height / 2 + 7);

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2);
            ctx.fill();
        }

        // Eventos Mouse
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
        window.addEventListener('mouseup', () => { if(isDrawing) { isDrawing = false; verificarProgreso(ctx, canvas); } });
        canvas.addEventListener('mousemove', draw);

        // Eventos Touch (Celulares)
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; draw(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { draw(e); }, { passive: false });
        canvas.addEventListener('touchend', () => { if(isDrawing) { isDrawing = false; verificarProgreso(ctx, canvas); } });
    }

    function verificarProgreso(ctx, canvas) {
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let hits = 0;
        for (let i = 3; i < data.length; i += 4) if (data[i] === 0) hits++;
        
        if (hits > (data.length / 4) * 0.4) { // Bajé al 40% para que sea más fácil ganar
            document.getElementById('paso-juego').classList.add('hidden');
            document.getElementById('paso-cupon').classList.remove('hidden');
            document.getElementById('txt-premio-foto').innerText = premioAsignado + " OFF";
            document.getElementById('txt-patente-foto').innerText = "PATENTE: " + patenteCliente;
            document.getElementById('txt-id-foto').innerText = "ID: " + codigoUnico;
            const qrContainer = document.getElementById("area-qr");
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { text: `ID:${codigoUnico}|VAL:${premioAsignado}`, width: 150, height: 150 });
        }
    }

    function enviarWhatsApp() {
        const mensaje = encodeURIComponent(`*⛽ NUEVO CUPÓN GNC*\n🚗 *Patente:* ${patenteCliente}\n🎁 *Premio:* ${premioAsignado} OFF\n🆔 *Código:* ${codigoUnico}`);
        window.open(`https://wa.me/${TELEFONO_ESTACION}?text=${mensaje}`, '_blank');
    }

    function descargarCupon() {
        html2canvas(document.getElementById('captura-cupon')).then(canvas => {
            const link = document.createElement('a');
            link.download = `GNC-${patenteCliente}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function reiniciarTodo() {
        location.reload(); // La forma más limpia de resetear todo el motor de raspado
    }
</script>
</body>
</html>
