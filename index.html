<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promo GNC - Raspá y Ganá</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary-color: #f1c40f; --secondary-color: #2c3e50; --bg-color: #f8f9fa; --success-color: #27ae60; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); margin: 0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 380px; text-align: center; }
        .titulo { color: var(--secondary-color); font-weight: 800; margin-bottom: 5px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; }
        .btn { width: 100%; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-principal { background: var(--primary-color); }
        .scratch-container { position: relative; width: 280px; height: 150px; margin: 0 auto; border: 4px solid var(--primary-color); border-radius: 15px; overflow: hidden; }
        .prize-under { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .monto-premio { font-size: 40px; font-weight: 900; color: var(--success-color); margin: 0; }
        #scratchCanvas { position: absolute; top: 0; left: 0; touch-action: none; z-index: 2; }
        #captura-cupon { background: white; padding: 20px; border: 2px dashed #ccc; border-radius: 15px; margin-bottom: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <div id="paso-registro">
        <h2 class="titulo">¡Promo GNC!</h2>
        <div class="input-group">
            <label>Patente del Vehículo</label>
            <input type="text" id="reg-patente" placeholder="ABC-123" maxlength="9">
        </div>
        <div class="input-group">
            <label>Tu WhatsApp</label>
            <input type="tel" id="reg-whatsapp" placeholder="1122334455">
        </div>
        <button onclick="validarYEmpezar()" class="btn btn-principal">JUGAR AHORA</button>
    </div>

    <div id="paso-juego" class="hidden">
        <div class="scratch-container">
            <div class="prize-under">
                <p id="texto-premio" class="monto-premio">--%</p> 
                <p style="font-weight: bold;">DESC. GNC</p>
            </div>
            <canvas id="scratchCanvas" width="280" height="150"></canvas>
        </div>
        <p style="color: #e67e22; font-weight: bold; margin-top: 15px;">👆 Raspá para ver tu premio</p>
    </div>

    <div id="paso-cupon" class="hidden">
        <div id="captura-cupon">
            <div style="font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 10px;">CUPÓN DE DESCUENTO GNC</div>
            <div id="area-qr" style="display: flex; justify-content: center; padding: 15px;"></div>
            <div id="txt-premio-foto" style="font-size: 24px; font-weight: 900; color: #27ae60;"></div>
            <div id="txt-patente-foto" style="font-weight: bold; margin-top: 5px;"></div>
        </div>
        <button onclick="descargarCupon()" class="btn" style="background:#3498db; color:white;">💾 GUARDAR CUPÓN</button>
    </div>
</div>

<script>
    let premioAsignado = "";
    let codigoUnico = "";
    let patenteCliente = "";

    function validarYEmpezar() {
        patenteCliente = document.getElementById('reg-patente').value.trim().toUpperCase();
        if (patenteCliente.length < 5) return alert("Ingresá tu patente");

        const rand = Math.random() * 100;
        if (rand < 10) premioAsignado = "20%";
        else if (rand < 30) premioAsignado = "15%";
        else if (rand < 70) premioAsignado = "10%";
        else premioAsignado = "5%";

        codigoUnico = "GNC" + Math.random().toString(36).substr(2, 4).toUpperCase();
        
        document.getElementById('paso-registro').classList.add('hidden');
        document.getElementById('paso-juego').classList.remove('hidden');
        iniciarJuego();
    }

    function iniciarJuego() {
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        document.getElementById('texto-premio').innerText = premioAsignado;
        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const scratch = (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 35;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fill();
        };

        canvas.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => { isDrawing = false; checkScratch(ctx, canvas); });
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchend', () => { isDrawing = false; checkScratch(ctx, canvas); });
    }

    function checkScratch(ctx, canvas) {
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let hits = 0;
        for (let i = 3; i < data.length; i += 4) if (data[i] === 0) hits++;
        if (hits > (data.length / 4) * 0.5) {
            document.getElementById('paso-juego').classList.add('hidden');
            document.getElementById('paso-cupon').classList.remove('hidden');
            document.getElementById('txt-premio-foto').innerText = premioAsignado + " OFF";
            document.getElementById('txt-patente-foto').innerText = "PATENTE: " + patenteCliente;
            new QRCode(document.getElementById("area-qr"), {
                text: `ID:${codigoUnico}|VAL:${premioAsignado}`,
                width: 140, height: 140
            });
        }
    }

    function descargarCupon() {
        html2canvas(document.getElementById('captura-cupon')).then(canvas => {
            const link = document.createElement('a');
            link.download = `Cupon-${patenteCliente}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
